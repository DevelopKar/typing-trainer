<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevelopKar - Type Jump</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:system-ui;
    background:#f1f5f9;
}

/* NAVBAR */

.topbar{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:75px;

    background:white;

    border-bottom:1px solid #dbe4ee;

    display:flex;
    justify-content:space-around;
    align-items:center;

    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#2563eb;
}

.stat{
    font-size:20px;
    font-weight:bold;
    color:#0f172a;
}

.home-btn{
    padding:10px 18px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
}

/* GAME */

.game{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* SKY */

.sky{
    position:absolute;
    inset:0;

    background:
    linear-gradient(to bottom,#dbeafe,#f8fafc);
}

/* CLOUD */

.cloud{
    position:absolute;

    width:150px;
    height:60px;

    background:white;

    border-radius:50px;

    opacity:0.8;
}

/* GROUND */

.ground{
    position:absolute;

    bottom:160px;
    left:0;

    width:100%;
    height:8px;

    background:#111827;
}

/* PLAYER */

.player{
    position:absolute;

    left:170px;
    bottom:168px;

    width:70px;
    height:70px;

    border-radius:18px;

    background:#2563eb;

    transition:0.08s;
}

/* EYES */

.player::before,
.player::after{

    content:"";

    position:absolute;

    width:10px;
    height:10px;

    border-radius:50%;

    background:white;

    top:18px;
}

.player::before{
    left:16px;
}

.player::after{
    right:16px;
}

/* OBSTACLE */

.obstacle{
    position:absolute;

    bottom:168px;

    width:50px;

    background:#ef4444;

    border-radius:10px;
}

/* WORD */

.word-box{
    position:absolute;

    top:120px;
    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.word{
    font-size:90px;
    font-weight:bold;

    color:#2563eb;
}

.info{
    margin-top:10px;

    font-size:18px;

    color:#64748b;
}

/* START POPUP */

.popup{
    position:fixed;

    inset:0;

    background:rgba(255,255,255,0.92);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup-content{

    width:500px;

    background:white;

    border-radius:24px;

    padding:35px;

    text-align:center;

    box-shadow:
    0 20px 60px rgba(0,0,0,0.12);
}

.popup-content h1{
    margin-bottom:20px;
    color:#2563eb;
}

.popup-content p{
    margin:12px 0;
    line-height:1.6;
    color:#475569;
}

.popup-content button{

    width:100%;

    margin-top:20px;

    padding:15px;

    border:none;

    border-radius:14px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;
}

/* GAME OVER */

.gameover{
    position:fixed;

    inset:0;

    background:rgba(255,255,255,0.94);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;
}

.gameover-box{

    width:500px;

    background:white;

    border-radius:24px;

    padding:35px;

    text-align:center;

    box-shadow:
    0 20px 60px rgba(0,0,0,0.12);
}

.gameover-box h1{
    color:#ef4444;
    margin-bottom:20px;
}

.gameover-box p{
    margin:12px 0;
    font-size:20px;
    color:#334155;
}

.retry-btn{

    width:100%;

    margin-top:20px;

    padding:15px;

    border:none;

    border-radius:14px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;
}

</style>
</head>
<body>

<!-- START POPUP -->

<div id="popup" class="popup">

    <div class="popup-content">

        <h1>⚡ Type Jump</h1>

        <p>Type correct letter to jump.</p>

        <p>Obstacle speed increases slowly.</p>

        <p>Touch obstacle OR go too high = Game Over.</p>

        <button onclick="startGame()">
            Start Run
        </button>

    </div>

</div>

<!-- GAME OVER -->

<div id="gameover" class="gameover">

    <div class="gameover-box">

        <h1> Game Over <br> Try Again</h1>

        <p>
            Score:
            <span id="finalScore">0</span>
        </p>

        <p>
            JumpBlock:
            <span id="finalBlocks">0</span>
        </p>

        <p>
            WPM:
            <span id="finalWpm">0</span>
        </p>

        <button class="retry-btn"
        onclick="location.reload()">

            Retry

        </button>

        <a 
   href="https://developkar.github.io/typing-trainer/games/games.html"
   class="retry-btn"
   style="margin-top:10px;background:#0f172a;display:inline-block;text-decoration:none;"
>
   Home
</a>

    </div>

</div>

<!-- NAVBAR -->

<div class="topbar">

    <div class="logo">
        DevelopKar
    </div>

    <div class="stat">
        Score:
        <span id="score">0</span>
    </div>

    <div class="stat">
        JumpBlock:
        <span id="blocks">0</span>
    </div>

    <div class="stat">
        Speed:
        <span id="speed">1</span>
    </div>

</div>

<!-- GAME -->

<div class="game">

    <div class="sky"></div>

    <div class="ground"></div>

    <div id="player" class="player"></div>

    <!-- WORD -->

    <div class="word-box">

        <div id="word" class="word">
            f
        </div>

        <div class="info">
            Press correct key
        </div>

    </div>

</div>

<script>

/* CLOUDS */

for(let i=0;i<5;i++){

    const cloud =
    document.createElement("div");

    cloud.classList.add("cloud");

    cloud.style.top =
    (60+i*90)+"px";

    cloud.style.left =
    (i*300)+"px";

    document.querySelector(".sky")
    .appendChild(cloud);

}

/* STATE */

let started = false;
let gameOver = false;

let score = 0;
let jumpBlocks = 0;

let obstacleSpeed = 6;
let obstacleDelay = 2200;

/* PLAYER */

let playerY = 0;
let velocity = 0;

const gravity = 0.7;

/* JUMP CONTROL */

let canJump = true;

/* TIMER */

let startTime = 0;
let correctKeys = 0;

/* WORDS */

const words = [

"f",
"j"

];

let currentWord = "";

/* DOM */

const player =
document.getElementById("player");

const wordEl =
document.getElementById("word");

/* START */

function startGame(){

    document.getElementById("popup")
    .style.display = "none";

    started = true;

    startTime = Date.now();

    nextWord();

    spawnObstacle();

}

/* NEXT WORD */

function nextWord(){

    currentWord =
    words[
        Math.floor(
            Math.random()*words.length
        )
    ];

    wordEl.innerText =
    currentWord;

}

/* INPUT */

document.addEventListener("keydown",(e)=>{

    if(!started || gameOver) return;

    const k =
    e.key.toLowerCase();

    if(k!=="f" && k!=="j"){
        return;
    }

    if(k===currentWord && canJump){

        correctKeys++;

        jump();

        score += 10;

        document.getElementById("score")
        .innerText = score;

        updateWPM();

        obstacleSpeed += 0.05;

        obstacleDelay =
        Math.max(
            850,
            obstacleDelay-10
        );

        document.getElementById("speed")
        .innerText =
        obstacleSpeed.toFixed(1);

        nextWord();

    }

});

/* WPM */

function updateWPM(){

    const minutes =
    (Date.now()-startTime)/60000;

    const wpm =
    Math.round(
        (correctKeys/5)/minutes
    );

    document.getElementById("finalWpm")
    .innerText =
    isFinite(wpm) ? wpm : 0;

}

/* JUMP */

function jump(){

    canJump = false;

    velocity = -13;

    player.style.transform =
    "scaleY(0.82)";

    setTimeout(()=>{

        player.style.transform =
        "scaleY(1)";

    },100);

    setTimeout(()=>{

        canJump = true;

    },120);

}

/* LOOP */

function loop(){

    requestAnimationFrame(loop);

    if(!started || gameOver) return;

    velocity += gravity;

    playerY += velocity;

    /* GROUND */

    if(playerY > 0){

        playerY = 0;

        velocity = 0;

    }

    /* TOP LIMIT */

    if(playerY < -430){

        endGame();

    }
/* NAVBAR COLLISION */

const playerTopPosition =
168 - playerY;

if(playerTopPosition <= 75){

    endGame();

}
    player.style.bottom =
    (168-playerY)+"px";

}

loop();

/* OBSTACLE */

function spawnObstacle(){

    if(gameOver) return;

    const obstacle =
    document.createElement("div");

    obstacle.classList.add("obstacle");

    obstacle.style.left =
    window.innerWidth+"px";

    const height =
    60 + Math.random()*60;

    obstacle.style.height =
    height+"px";

    document.querySelector(".game")
    .appendChild(obstacle);

    let x = window.innerWidth;

    let counted = false;

    const move = setInterval(()=>{

        if(gameOver){

            clearInterval(move);
            return;

        }

        x -= obstacleSpeed;

        obstacle.style.left =
        x+"px";

        /* PLAYER BOX */

        const playerLeft = 170;
        const playerRight = 240;

        const playerTop =
        (168-playerY);

        const playerBottom =
        playerTop + 70;

        /* OBSTACLE BOX */

        const obstacleLeft = x;
        const obstacleRight = x+50;

        const obstacleTop =
        168;

        const obstacleBottom =
        168 + height;

        /* COLLISION */

        const collideX =
        playerRight > obstacleLeft &&
        playerLeft < obstacleRight;

        const collideY =
        playerBottom > obstacleTop &&
        playerTop < obstacleBottom;

        if(collideX && collideY){

            endGame();

        }

        /* PASSED */

        if(x < 150 && !counted){

            counted = true;

            jumpBlocks++;

            document.getElementById("blocks")
            .innerText = jumpBlocks;

        }

        /* REMOVE */

        if(x < -100){

            obstacle.remove();

            clearInterval(move);

        }

    },16);

    setTimeout(
        spawnObstacle,
        obstacleDelay
    );

}

/* GAME OVER */

function endGame(){

    gameOver = true;

    document.getElementById("finalScore")
    .innerText = score;

    document.getElementById("finalBlocks")
    .innerText = jumpBlocks;

    document.getElementById("gameover")
    .style.display = "flex";

}

</script>

</body>
</html>
