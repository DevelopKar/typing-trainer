<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevelopKar Typing Trainer</title>

<style>
body {
    margin:0;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:1000px;
    background:rgba(30,41,59,0.6);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:16px;
}

h2 { text-align:center; }

.name-box input {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
}

.text {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    font-size:26px;
    text-align:center;
    letter-spacing:2px;
}

.correct { color:#22c55e; }
.current { border-bottom:2px solid #22c55e; }

textarea {
    width:100%;
    height:90px;
    margin-top:15px;
    font-size:18px;
    padding:10px;
    border-radius:10px;
    border:none;
}

.stats {
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.timer-bar {
    height:6px;
    background:#334155;
    margin-top:10px;
    border-radius:10px;
}

.timer-fill {
    height:100%;
    width:100%;
    background:#22c55e;
    border-radius:10px;
}

.keyboard { margin-top:20px; }
.row { text-align:center; }

.key {
    display:inline-block;
    padding:12px 14px;
    margin:4px;
    background:#334155;
    border-radius:6px;
    min-width:40px;
}

.active {
    background:#22c55e !important;
    transform:scale(1.2);
}

.highlight {
    background:#f59e0b !important;
}

.start-btn {
    margin-top:15px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    cursor:pointer;
}

/* 🔥 POPUP */
.popup {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content {
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    text-align:center;
}

.popup-content button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Lesson 1 - F & J Training</h2>

<div class="name-box">
<input id="username" placeholder="Enter your name">
</div>

<div id="timer">Time: 60</div>

<div class="timer-bar">
<div id="timerFill" class="timer-fill"></div>
</div>

<div id="text" class="text"></div>

<textarea id="input" disabled></textarea>

<div class="stats">
<span>WPM: <b id="wpm">0</b></span>
<span>Accuracy: <b id="acc">100</b>%</span>
<span>Score: <b id="score">0</b></span>
</div>

<div id="keyboard" class="keyboard"></div>

<button class="start-btn" onclick="start()">Start</button>

</div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <h2>🎉 Nice!</h2>
        <p>You completed the lesson</p>
        <p>WPM: <b id="p_wpm"></b></p>
        <p>Accuracy: <b id="p_acc"></b>%</p>
        <p>Score: <b id="p_score"></b></p>
        <button onclick="goHome()">Go Home</button>
    </div>
</div>

<script>

const fullLesson = "fj jf fj jf fjfjfj jfjfjf ffff jjjj fjfjfjfjf jfjfj fj fj jf jj jfjf fjfj jfjfjfj jjjj ffff jfjfjf fjfjfj jfjfjfj fjfjfj jfjfj jfjfj fjfjfjfj";

let words = fullLesson.split(" ");
let chunkSize = 2;
let pointer = 0;

let currentText = "";
let index=0, correct=0, errors=0;
let time=60, timer=null;
let started=false;
let startTime=0;

const textDiv=document.getElementById("text");
const input=document.getElementById("input");

// load chunk
function loadChunk(){
    if(pointer >= words.length){
        finish();
        return;
    }

    currentText = words.slice(pointer, pointer+chunkSize).join(" ");
    pointer += chunkSize;

    textDiv.innerHTML="";
    index=0;

    currentText.split("").forEach((c,i)=>{
        let span=document.createElement("span");
        span.innerText=c;
        if(i===0) span.classList.add("current");
        textDiv.appendChild(span);
    });
}

// keyboard
["qwertyuiop","asdfghjkl;","zxcvbnm"].forEach(row=>{
    let div=document.createElement("div");
    div.classList.add("row");

    row.split("").forEach(k=>{
        let key=document.createElement("div");
        key.innerText=k;
        key.classList.add("key");

        if(k==="f" || k==="j") key.classList.add("highlight");

        key.id="k-"+k;
        div.appendChild(key);
    });

    document.getElementById("keyboard").appendChild(div);
});

// start
function start(){
    if(document.getElementById("username").value===""){
        alert("Enter name first");
        return;
    }

    loadChunk();

    input.disabled=false;
    input.focus();
    started=true;
    startTime=new Date();

    timer=setInterval(()=>{
        time--;
        document.getElementById("timer").innerText="Time: "+time;

        let percent=(time/60)*100;
        document.getElementById("timerFill").style.width=percent+"%";

        updateStats();

        if(time<=0) finish();
    },1000);
}

// typing
document.addEventListener("keydown",(e)=>{
    if(!started) return;

    let expected=currentText[index];
    let k=e.key;

    e.preventDefault();

    if(k!==expected){
        errors++;
        updateStats();
        return;
    }

    let spans=textDiv.querySelectorAll("span");

    spans[index].classList.remove("current");
    spans[index].classList.add("correct");

    index++;
    correct++;

    if(spans[index]){
        spans[index].classList.add("current");
    } else {
        input.value="";
        loadChunk();
        return;
    }

    input.value+=k;
    updateStats();
});

// stats
function updateStats(){
    let total=correct+errors;
    let acc= total>0 ? (correct/total)*100 : 100;

    let timePassed = (new Date() - startTime)/60000;
    let wpm = timePassed>0 ? (correct/5)/timePassed : 0;

    let score = (correct*2)-errors;

    document.getElementById("acc").innerText=acc.toFixed(2);
    document.getElementById("wpm").innerText=Math.round(wpm);
    document.getElementById("score").innerText=score;
}

// finish
function finish(){
    clearInterval(timer);
    started=false;
    input.disabled=true;

    document.getElementById("popup").style.display="flex";

    document.getElementById("p_wpm").innerText =
    document.getElementById("wpm").innerText;

    document.getElementById("p_acc").innerText =
    document.getElementById("acc").innerText;

    document.getElementById("p_score").innerText =
    document.getElementById("score").innerText;
}

// home
function goHome(){
    window.location.href="../index.html";
}

</script>

</body>
</html>
