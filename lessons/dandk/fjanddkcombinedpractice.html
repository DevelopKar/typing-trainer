<script>

/* LESSON */

const fullLesson =
" f j d k fj dk ff jj dd kk kk dd ff jj dfjk kjfd dj fk fj dk fjfjfj dkdkdk fkdj kdjf fkjd jkdf fj fj fj fj dk dk dk dk dfjk dfjk dfjk dfjk kjfd kjfd kjfd kjfd djfk djfk djfk djfk jdkf jdkf jdkf jdkf";

/* CHUNKS */

let words =
fullLesson.split(" ");

let pointer = 0;

let currentChunk = "";

let chunkSize = 4;

/* STATE */

let currentIndex = 0;

let correct = 0;
let errors = 0;

let time = 120;

let timer = null;

let started = false;

let startTime = 0;

/* DOM */

const textDiv =
document.getElementById("text");

const input =
document.getElementById("input");

document.getElementById(
"combo").innerText = correct;

document.getElementById(
"correct").innerText = correct;

document.getElementById(
"stability").innerText =
Math.max(60,100-errors);

/* LOAD */

function loadChunk(){

    if(pointer >= words.length){

        finish();
        return;
    }

    currentChunk =

    words.slice(
        pointer,
        pointer + chunkSize
    ).join(" ");

    pointer += chunkSize;

    currentIndex = 0;

    textDiv.innerHTML = "";

    currentChunk.split("").forEach((char,i)=>{

        const box =
        document.createElement("div");

        box.classList.add("char-box");

        if(char===" "){

            box.innerText = "SPACE";

            box.classList.add(
            "space-box");

        }

        else{

            box.innerText = char;

        }

        if(i===0){

            box.classList.add(
            "current");

        }

        textDiv.appendChild(box);

    });

}

/* KEYBOARD */

const layout = [

["1","2","3","4","5","6","7","8","9","0"],

["q","w","e","r","t","y","u","i","o","p"],

["a","s","d","f","g","h","j","k","l"],

["z","x","c","v","b","n","m"],

["space"]

];

layout.forEach(row=>{

    const rowDiv =
    document.createElement("div");

    rowDiv.classList.add("row");

    row.forEach(k=>{

        const key =
        document.createElement("div");

        key.classList.add("key");

        key.innerText = k;

        key.id = "k-"+k;

        rowDiv.appendChild(key);

    });

    keyboard.appendChild(rowDiv);

});

/* START */

function start(){

    pointer = 0;

    currentIndex = 0;

    correct = 0;
    errors = 0;

    time = 120;

    started = true;

    startTime = Date.now();

    input.disabled = false;

    input.focus();

    loadChunk();

    updateNextKey();

    clearInterval(timer);

    timer = setInterval(()=>{

        time--;

        document.getElementById(
        "timer").innerText =
        "Time: "+time;

        document.getElementById(
        "timerFill").style.width =
        (time/120)*100 + "%";

        updateStats();

        if(time<=0){

            finish();
        }

    },1000);

}

/* NEXT */

function updateNextKey(){

    document.querySelectorAll(
    ".next-key")

    .forEach(el=>{

        el.classList.remove(
        "next-key");

    });

    let next =
    currentChunk[currentIndex];

    if(next===" "){

        next = "space";
    }

    const key =
    document.getElementById(
    "k-"+next);

    if(key){

        key.classList.add(
        "next-key");
    }

}

/* INPUT */

document.addEventListener(
"keydown",(e)=>{

    if(!started) return;

    let k = e.key;

    let visual =

    k===" "
    ? "space"
    : k.toLowerCase();

    const keyEl =
    document.getElementById(
    "k-"+visual);

    if(keyEl){

        keyEl.classList.add(
        "active");
    }

    e.preventDefault();

    const expected =
    currentChunk[currentIndex];

    const boxes =
    document.querySelectorAll(
    ".char-box");

    /* WRONG */

    if(k!==expected){

        boxes[currentIndex]
        .classList.add("wrong");

        errors++;

        updateStats();

        setTimeout(()=>{

            boxes[currentIndex]
            .classList.remove(
            "wrong");

        },180);

        return;
    }

    /* CORRECT */

    boxes[currentIndex]
    .classList.remove("current");

    boxes[currentIndex]
    .classList.add("correct");

    boxes[currentIndex]
    .animate([

        {
            transform:
            "scale(1)",

            opacity:1,

            filter:"blur(0px)"
        },

        {
            transform:
            "scale(0.2) rotate(25deg)",

            opacity:0,

            filter:"blur(10px)"
        }

    ],{

        duration:220,
        easing:"ease-out"

    });

    currentIndex++;

    correct++;

    input.value += k;

    /* NEXT CHUNK */

    if(currentIndex >= currentChunk.length){

        setTimeout(()=>{

            loadChunk();

            updateNextKey();

        },180);

        updateStats();

        return;
    }

    boxes[currentIndex]
    .classList.add("current");

    updateStats();

    updateNextKey();

});

/* KEYUP */

document.addEventListener(
"keyup",(e)=>{

    let visual =

    e.key===" "
    ? "space"
    : e.key.toLowerCase();

    const keyEl =
    document.getElementById(
    "k-"+visual);

    if(keyEl){

        keyEl.classList.remove(
        "active");
    }

});

/* STATS */

function updateStats(){

    const total =
    correct + errors;

    const acc =

    total>0
    ? (correct/total)*100
    : 100;

    const minutes =

    (Date.now()-startTime)
    /60000;

    const wpm =

    minutes>0
    ? ((correct/5)/minutes)
    : 0;

    const score =
    (correct*2)-errors;

    document.getElementById(
    "acc").innerText =
    acc.toFixed(0);

    document.getElementById(
    "wpm").innerText =
    Math.round(wpm);

    document.getElementById(
    "score").innerText =
    score;
}

/* FINISH */

function finish(){

    clearInterval(timer);

    started = false;

    input.disabled = true;

    document.getElementById(
    "popup").style.display =
    "flex";

    document.getElementById(
    "p_wpm").innerText =
    document.getElementById(
    "wpm").innerText;

    document.getElementById(
    "p_acc").innerText =
    document.getElementById(
    "acc").innerText;

    document.getElementById(
    "p_score").innerText =
    document.getElementById(
    "score").innerText;

    document.getElementById(
"p_correct").innerText =
correct;

document.getElementById(
"p_combo").innerText =
correct;
}

/* HOME */

function goHome(){

    window.location.href =
    "../index.html";
}
function retryLesson(){

    location.reload();
}

function goLesson(){

    window.location.href =
    "../lessons/fandj/practice.html";
}
</script>
