<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DevelopKar - Neo Typing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    radial-gradient(circle at top,
    #111827,
    #020617 70%);

    color:white;

    font-family:system-ui;

    overflow-x:hidden;

    min-height:100vh;

    padding:30px;
}

/* BACKGROUND */

.bg-light{

    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    background:
    rgba(59,130,246,0.10);

    filter:blur(120px);

    top:-200px;
    right:-200px;

    z-index:-1;
}

/* CONTAINER */

.container{

    width:1100px;

    margin:auto;

    background:
    rgba(15,23,42,0.72);

    backdrop-filter:blur(14px);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    padding:35px;

    box-shadow:
    0 20px 80px rgba(0,0,0,0.4);
}

/* TITLE */

.title{

    text-align:center;

    margin-bottom:30px;
}

.title h1{

    font-size:48px;

    color:#60a5fa;
}

.title p{

    color:#94a3b8;

    margin-top:10px;

    font-size:18px;
}

/* INPUT */

.name-box input{

    width:100%;

    padding:18px;

    border:none;

    outline:none;

    border-radius:16px;

    background:#0f172a;

    color:white;

    font-size:17px;

    border:
    1px solid rgba(255,255,255,0.06);
}

/* TIMER */

.timer-wrap{

    margin-top:22px;
}

#timer{

    margin-bottom:8px;

    font-size:18px;

    color:#cbd5e1;
}

.timer-bar{

    width:100%;
    height:10px;

    background:#1e293b;

    border-radius:20px;

    overflow:hidden;
}

.timer-fill{

    width:100%;
    height:100%;

    background:
    linear-gradient(90deg,
    #3b82f6,
    #60a5fa);

    transition:1s linear;
}

/* TEXT AREA */

.text{

    margin-top:28px;

    background:
    rgba(2,6,23,0.75);

    border:
    1px solid rgba(255,255,255,0.06);

    border-radius:24px;

    padding:30px;

    min-height:150px;

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;

    gap:12px;
}

/* LETTER BOX */

.char-box{

    min-width:58px;
    height:64px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:18px;

    font-size:28px;
    font-weight:bold;

    background:#111827;

    border:
    2px solid #1e293b;

    transition:0.18s;
}

/* SPACE */

.space-box{

    min-width:100px;

    font-size:14px;

    color:#94a3b8;

    background:#0f172a;

    border:
    2px dashed #475569;

    letter-spacing:2px;
}

/* CURRENT */

.current{

    border:
    2px solid #60a5fa;

    box-shadow:
    0 0 25px rgba(96,165,250,0.45);

    transform:translateY(-4px);
}

/* CORRECT */

.correct{

    background:
    linear-gradient(135deg,
    #22c55e,
    #16a34a);

    opacity:0.2;

    transform:scale(0.82);

    border:none;
}

/* WRONG */

.wrong{

    background:
    linear-gradient(135deg,
    #ef4444,
    #dc2626);

    border:none;

    animation:shake 0.2s;
}

@keyframes shake{

    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}

/* TEXTAREA */

textarea{

    width:100%;
    height:90px;

    margin-top:25px;

    background:#0f172a;

    border:none;

    outline:none;

    resize:none;

    color:white;

    font-size:18px;

    border-radius:18px;

    padding:18px;

    border:
    1px solid rgba(255,255,255,0.06);
}

/* STATS */

.stats{

    margin-top:24px;

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:18px;
}

.card{

    background:
    rgba(2,6,23,0.75);

    border:
    1px solid rgba(255,255,255,0.06);

    border-radius:22px;

    padding:24px;

    text-align:center;
}

.card h3{

    color:#94a3b8;

    margin-bottom:10px;
}

.card p{

    font-size:35px;
    font-weight:bold;

    color:#60a5fa;
}

/* BUTTON */

.start-btn{

    width:100%;

    margin-top:26px;

    padding:18px;

    border:none;

    border-radius:20px;

    background:
    linear-gradient(135deg,
    #2563eb,
    #3b82f6);

    color:white;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

.start-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 30px rgba(59,130,246,0.35);
}

/* KEYBOARD */

.keyboard{

    margin-top:30px;
}

.row{

    display:flex;
    justify-content:center;

    margin-bottom:10px;
}

.key{

    min-width:58px;
    height:58px;

    margin:5px;

    border-radius:16px;

    background:#111827;

    border:
    1px solid rgba(255,255,255,0.08);

    display:flex;
    justify-content:center;
    align-items:center;

    transition:0.08s;
}

/* SPACE KEY */

#k-space{

    width:320px;
}

/* HOME KEYS */

.highlight{

    background:
    linear-gradient(135deg,
    #f59e0b,
    #fbbf24);

    color:black;

    font-weight:bold;
}

/* NEXT KEY */

.next-key{

    box-shadow:
    0 0 25px rgba(59,130,246,0.65);

    border:
    1px solid #60a5fa;
}

/* PRESSED */

.active{

    transform:scale(0.9);

    background:
    linear-gradient(135deg,
    #22c55e,
    #16a34a);
}

/* POPUP */

.popup{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.72);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;

    backdrop-filter:blur(10px);
}

.popup-box{

    width:420px;

    background:#0f172a;

    border-radius:28px;

    padding:40px;

    text-align:center;
}

.popup-box h2{

    font-size:40px;

    color:#60a5fa;

    margin-bottom:18px;
}

.popup-box p{

    margin:14px 0;

    font-size:20px;
}

.popup-box button{

    width:100%;

    margin-top:20px;

    padding:16px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(135deg,
    #2563eb,
    #3b82f6);

    color:white;

    font-size:18px;

    cursor:pointer;
}

</style>
</head>
<body>

<div class="bg-light"></div>

<div class="container">

<div class="title">

<h1>DevelopKar</h1>

<p>
Neo Lesson 1 — F & J Precision Training
</p>

</div>

<!-- NAME -->

<div class="name-box">

<input id="username"
placeholder="Enter your name">

</div>

<!-- TIMER -->

<div class="timer-wrap">

<div id="timer">
Time: 60
</div>

<div class="timer-bar">

<div id="timerFill"
class="timer-fill"></div>

</div>

</div>

<!-- TEXT -->

<div id="text"
class="text"></div>

<!-- INPUT -->

<textarea id="input"
disabled></textarea>

<!-- STATS -->

<div class="stats">

<div class="card">

<h3>WPM</h3>

<p id="wpm">0</p>

</div>

<div class="card">

<h3>Accuracy</h3>

<p id="acc">100</p>

</div>

<div class="card">

<h3>Score</h3>

<p id="score">0</p>

</div>

</div>

<!-- BUTTON -->

<button class="start-btn"
onclick="start()">

Start Typing

</button>

<!-- KEYBOARD -->

<div id="keyboard"
class="keyboard"></div>

</div>

<!-- POPUP -->

<div id="popup"
class="popup">

<div class="popup-box">

<h2>Completed</h2>

<p>
WPM:
<b id="p_wpm"></b>
</p>

<p>
Accuracy:
<b id="p_acc"></b>%
</p>

<p>
Score:
<b id="p_score"></b>
</p>

<button onclick="goHome()">

Go Home

</button>

</div>

</div>

<script>

/* LESSON */

const fullLesson =

"fj jf fj jf fjfjfj jfjfjf ffff jjjj fjfjfjfjf jfjfj fj fj jf jj jfjf fjfj jfjfjfj jjjj ffff jfjfjf fjfjfj";

/* CHUNKS */

let words =
fullLesson.split(" ");

let pointer = 0;

let currentChunk = "";

let chunkSize = 4;

/* STATE */

let currentIndex = 0;

let correct = 0;
let errors = 0;

let time = 60;

let timer = null;

let started = false;

let startTime = 0;

/* DOM */

const textDiv =
document.getElementById("text");

const input =
document.getElementById("input");

/* LOAD CHUNK */

function loadChunk(){

    if(pointer >= words.length){

        finish();
        return;
    }

    currentChunk =

    words.slice(
        pointer,
        pointer + chunkSize
    ).join(" ");

    pointer += chunkSize;

    currentIndex = 0;

    textDiv.innerHTML = "";

    currentChunk.split("").forEach((char,i)=>{

        const box =
        document.createElement("div");

        box.classList.add("char-box");

        if(char===" "){

            box.innerText = "SPACE";

            box.classList.add(
            "space-box");

        }

        else{

            box.innerText = char;

        }

        if(i===0){

            box.classList.add(
            "current");

        }

        textDiv.appendChild(box);

    });

}

/* KEYBOARD */

const layout = [

["1","2","3","4","5","6","7","8","9","0"],

["q","w","e","r","t","y","u","i","o","p"],

["a","s","d","f","g","h","j","k","l"],

["z","x","c","v","b","n","m"],

["space"]

];

layout.forEach(row=>{

    const rowDiv =
    document.createElement("div");

    rowDiv.classList.add("row");

    row.forEach(k=>{

        const key =
        document.createElement("div");

        key.classList.add("key");

        key.innerText = k;

        key.id = "k-"+k;

        if(k==="f" || k==="j"){

            key.classList.add(
            "highlight");

        }

        rowDiv.appendChild(key);

    });

    keyboard.appendChild(rowDiv);

});

/* START */

function start(){

    if(
        document.getElementById(
        "username").value.trim()===""
    ){

        alert("Enter name");

        return;
    }

    pointer = 0;

    currentIndex = 0;

    correct = 0;
    errors = 0;

    time = 60;

    started = true;

    startTime = Date.now();

    input.disabled = false;

    input.focus();

    loadChunk();

    updateNextKey();

    clearInterval(timer);

    timer = setInterval(()=>{

        time--;

        document.getElementById(
        "timer").innerText =

        "Time: "+time;

        document.getElementById(
        "timerFill").style.width =

        (time/60)*100 + "%";

        updateStats();

        if(time<=0){

            finish();

        }

    },1000);

}

/* NEXT KEY */

function updateNextKey(){

    document.querySelectorAll(
    ".next-key")

    .forEach(el=>{

        el.classList.remove(
        "next-key");

    });

    let next =
    currentChunk[currentIndex];

    if(next===" "){

        next = "space";

    }

    const key =
    document.getElementById(
    "k-"+next);

    if(key){

        key.classList.add(
        "next-key");

    }

}

/* INPUT */

document.addEventListener(
"keydown",(e)=>{

    if(!started) return;

    let k = e.key;

    let visual =

    k===" "
    ? "space"
    : k.toLowerCase();

    const keyEl =
    document.getElementById(
    "k-"+visual);

    if(keyEl){

        keyEl.classList.add(
        "active");

    }

    e.preventDefault();

    const expected =
    currentChunk[currentIndex];

    const boxes =
    document.querySelectorAll(
    ".char-box");

    /* WRONG */

    if(k!==expected){

        boxes[currentIndex]
        .classList.add("wrong");

        errors++;

        updateStats();

        setTimeout(()=>{

            boxes[currentIndex]
            .classList.remove(
            "wrong");

        },180);

        return;
    }

    /* CORRECT */

    boxes[currentIndex]
    .classList.remove("current");

    boxes[currentIndex]
    .classList.add("correct");

    boxes[currentIndex]
    .animate([

        {
            transform:
            "scale(1) rotate(0deg)",

            opacity:1,

            filter:"blur(0px)"
        },

        {
            transform:
            "scale(0.2) rotate(30deg)",

            opacity:0,

            filter:"blur(10px)"
        }

    ],{

        duration:220,
        easing:"ease-out"

    });

    currentIndex++;

    correct++;

    input.value += k;

    /* NEXT CHUNK */

    if(currentIndex >= currentChunk.length){

        setTimeout(()=>{

            loadChunk();

            updateNextKey();

        },180);

        updateStats();

        return;
    }

    boxes[currentIndex]
    .classList.add("current");

    updateStats();

    updateNextKey();

});

/* KEYUP */

document.addEventListener(
"keyup",(e)=>{

    let visual =

    e.key===" "
    ? "space"
    : e.key.toLowerCase();

    const keyEl =
    document.getElementById(
    "k-"+visual);

    if(keyEl){

        keyEl.classList.remove(
        "active");

    }

});

/* STATS */

function updateStats(){

    const total =
    correct + errors;

    const acc =

    total>0
    ? (correct/total)*100
    : 100;

    const minutes =

    (Date.now()-startTime)
    /60000;

    const wpm =

    minutes>0
    ? ((correct/5)/minutes)
    : 0;

    const score =
    (correct*2)-errors;

    document.getElementById(
    "acc").innerText =

    acc.toFixed(0);

    document.getElementById(
    "wpm").innerText =

    Math.round(wpm);

    document.getElementById(
    "score").innerText =

    score;

}

/* FINISH */

function finish(){

    clearInterval(timer);

    started = false;

    input.disabled = true;

    document.getElementById(
    "popup").style.display =

    "flex";

    document.getElementById(
    "p_wpm").innerText =

    document.getElementById(
    "wpm").innerText;

    document.getElementById(
    "p_acc").innerText =

    document.getElementById(
    "acc").innerText;

    document.getElementById(
    "p_score").innerText =

    document.getElementById(
    "score").innerText;

}

/* HOME */

function goHome(){

    window.location.href =
    "../index.html";

}

</script>

</body>
</html>
