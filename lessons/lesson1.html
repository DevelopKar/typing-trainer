<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevelopKar Typing Trainer</title>

<style>

body{
    margin:0;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    font-family:system-ui;
    padding:20px;
    box-sizing:border-box;
    overflow-x:auto;
}

.container{
    width:fit-content;
    min-width:1100px;
    margin:auto;
    background:rgba(30,41,59,0.65);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:18px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    transform:scale(0.95);
transform-origin:top center;
}

/* title */
h2{
    text-align:center;
    margin-top:0;
    margin-bottom:20px;
}

/* input */
.name-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
    outline:none;
}

/* timer */
.timer-wrapper{
    margin-top:15px;
}

#timer{
    margin-bottom:8px;
    font-size:18px;
}

.timer-bar{
    width:100%;
    height:8px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
}

.timer-fill{
    width:100%;
    height:100%;
    background:#22c55e;
    transition:1s linear;
}

/* lesson text */
.text{
    margin-top:20px;
    background:#1e293b;
    padding:25px;
    border-radius:14px;
    font-size:30px;
    text-align:center;
    letter-spacing:3px;
    min-height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
}

/* typing states */
.correct{
    color:#22c55e;
}

.current{
    border-bottom:3px solid #22c55e;
}

.wrong{
    color:#ef4444;
}

/* textarea */
textarea{
    width:100%;
    height:90px;
    margin-top:18px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:15px;
    font-size:18px;
    resize:none;
    box-sizing:border-box;
}

/* stats */
.stats{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    background:#111827;
    padding:15px;
    border-radius:12px;
    font-size:18px;
}

/* button */
.start-btn{
    width:100%;
    margin-top:18px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.start-btn:hover{
    transform:scale(1.01);
    background:#16a34a;
}

/* keyboard */
.keyboard{
    margin-top:25px;
    user-select:none;
}

.row{
    display:flex;
    justify-content:center;
    margin-bottom:8px;
}

.key{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#334155;
    color:white;
    margin:4px;
    height:44px;
    min-width:44px;
    border-radius:8px;
    transition:0.08s;
    font-size:14px;
    box-shadow:0 3px 0 #0f172a;
}

/* highlighted home keys */
.highlight{
    background:#f59e0b !important;
    color:black;
    font-weight:bold;
}

/* current required key */
.next-key{
    background:#3b82f6 !important;
    box-shadow:0 0 20px #3b82f6;
}

/* pressed key */
.active{
    transform:scale(0.92);
    background:#22c55e !important;
    box-shadow:0 0 20px #22c55e;
}

/* popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-content{
    width:350px;
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    text-align:center;
    animation:popup 0.25s ease;
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.popup-content h2{
    margin-top:0;
}

.popup-content p{
    font-size:18px;
}

.popup-content button{
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* widths */
.w-backspace{ width:120px; }
.w-tab{ width:90px; }
.w-caps{ width:100px; }
.w-enter{ width:120px; }
.w-shift{ width:140px; }
.w-space{ width:350px; }

</style>
</head>

<body>

<div class="container">
<h2>DevelopKar</h2>
<h2>Lesson 1 - F & J Training</h2>

<div class="name-box">
    <input id="username" placeholder="Enter your name">
</div>

<div class="timer-wrapper">
    <div id="timer">Time: 60</div>

    <div class="timer-bar">
        <div id="timerFill" class="timer-fill"></div>
    </div>
</div>

<div id="text" class="text"></div>

<textarea id="input" disabled></textarea>

<div class="stats">
    <span>WPM: <b id="wpm">0</b></span>
    <span>Accuracy: <b id="acc">100</b>%</span>
    <span>Score: <b id="score">0</b></span>
</div>

<button class="start-btn" onclick="start()">Start Typing</button>

<div id="keyboard" class="keyboard"></div>

</div>

<!-- popup -->
<div id="popup" class="popup">

    <div class="popup-content">

        <h2>🎉 Nice!</h2>

        <p>You successfully completed the lesson</p>

        <p>WPM: <b id="p_wpm"></b></p>

        <p>Accuracy: <b id="p_acc"></b>%</p>

        <p>Score: <b id="p_score"></b></p>

        <button onclick="goHome()">Go Home</button>

    </div>

</div>

<script>

/* LESSON */
const fullLesson =
"fj jf fj jf fjfjfj jfjfjf ffff jjjj fjfjfjfjf jfjfj fj fj jf jj jfjf fjfj jfjfjfj jjjj ffff jfjfjf fjfjfj jfjfjfj fjfjfj jfjfj jfjfj fjfjfjfj";

/* STATE */
let words = fullLesson.split(" ");
let chunkSize = 2;
let pointer = 0;

let currentText = "";
let index = 0;

let correct = 0;
let errors = 0;

let started = false;

let time = 60;
let timer = null;

let startTime = 0;

/* ELEMENTS */
const textDiv = document.getElementById("text");
const input = document.getElementById("input");

/* KEYBOARD LAYOUT */
const keyboardLayout = [

["Esc","1","2","3","4","5","6","7","8","9","0","-","=","Backspace"],

["Tab","q","w","e","r","t","y","u","i","o","p","[","]","\\"],

["Caps","a","s","d","f","g","h","j","k","l",";","'","Enter"],

["Shift","z","x","c","v","b","n","m",",",".","/","Shift"],

["Ctrl","Win","Alt","Space","Alt","Fn","Menu","Ctrl"]

];

/* RENDER KEYBOARD */
keyboardLayout.forEach(row=>{

    const rowDiv = document.createElement("div");
    rowDiv.classList.add("row");

    row.forEach(k=>{

        const key = document.createElement("div");

        key.innerText = k;

        key.classList.add("key");

        const lower = k.toLowerCase();

        key.id = "k-" + lower;

        /* widths */
        if(k==="Backspace") key.classList.add("w-backspace");
        if(k==="Tab") key.classList.add("w-tab");
        if(k==="Caps") key.classList.add("w-caps");
        if(k==="Enter") key.classList.add("w-enter");
        if(k==="Shift") key.classList.add("w-shift");
        if(k==="Space") key.classList.add("w-space");

        /* highlight F J */
        if(lower==="f" || lower==="j"){
            key.classList.add("highlight");
        }

        rowDiv.appendChild(key);

    });

    document.getElementById("keyboard").appendChild(rowDiv);

});

/* LOAD TEXT CHUNK */
function loadChunk(){

    if(pointer >= words.length){
        finish();
        return;
    }

    currentText =
    words.slice(pointer,pointer+chunkSize).join(" ");

    pointer += chunkSize;

    textDiv.innerHTML = "";

    index = 0;

    currentText.split("").forEach((char,i)=>{

        const span = document.createElement("span");

        span.innerText = char;

        if(i===0){
            span.classList.add("current");
        }

        textDiv.appendChild(span);

    });

    updateNextKey();

}

/* START */
function start(){

    const username =
    document.getElementById("username").value.trim();

    if(username===""){
        alert("Enter name first");
        return;
    }

    /* reset */
    pointer = 0;
    correct = 0;
    errors = 0;
    time = 60;

    document.getElementById("popup").style.display = "none";

    loadChunk();

    started = true;

    input.disabled = false;

    input.value = "";

    input.focus();

    startTime = new Date();

    clearInterval(timer);

    timer = setInterval(()=>{

        time--;

        document.getElementById("timer").innerText =
        "Time: " + time;

        let percent = (time/60)*100;

        document.getElementById("timerFill").style.width =
        percent + "%";

        updateStats();

        if(time<=0){
            finish();
        }

    },1000);

}

/* UPDATE NEXT KEY GLOW */
function updateNextKey(){

    document.querySelectorAll(".next-key")
    .forEach(el=>{
        el.classList.remove("next-key");
    });

    let next = currentText[index];

    if(next===" "){
        next = "space";
    }

    const key =
    document.getElementById("k-"+next.toLowerCase());

    if(key){
        key.classList.add("next-key");
    }

}

/* TYPING */
document.addEventListener("keydown",(e)=>{

    if(!started) return;

    let k = e.key;

    /* visual press */
    let visualKey = k===" " ? "space" : k.toLowerCase();

    const keyEl =
    document.getElementById("k-"+visualKey);

    if(keyEl){
        keyEl.classList.add("active");
    }

    e.preventDefault();

    let expected = currentText[index];

    if(k!==expected){

        errors++;

        updateStats();

        return;

    }

    const spans =
    textDiv.querySelectorAll("span");

    spans[index].classList.remove("current");

    spans[index].classList.add("correct");

    index++;

    correct++;

    if(spans[index]){

        spans[index].classList.add("current");

    }else{

        input.value = "";

        loadChunk();

        updateStats();

        return;

    }

    input.value += k;

    updateStats();

    updateNextKey();

});

/* KEY RELEASE */
document.addEventListener("keyup",(e)=>{

    let visualKey =
    e.key===" " ? "space" : e.key.toLowerCase();

    const keyEl =
    document.getElementById("k-"+visualKey);

    if(keyEl){
        keyEl.classList.remove("active");
    }

});

/* STATS */
function updateStats(){

    let total = correct + errors;

    let acc =
    total>0 ? (correct/total)*100 : 100;

    let timePassed =
    (new Date() - startTime)/60000;

    let wpm =
    timePassed>0 ? ((correct/5)/timePassed) : 0;

    let score =
    (correct*2)-errors;

    document.getElementById("acc").innerText =
    acc.toFixed(2);

    document.getElementById("wpm").innerText =
    Math.round(wpm);

    document.getElementById("score").innerText =
    score;

}

/* FINISH */
function finish(){

    clearInterval(timer);

    started = false;

    input.disabled = true;

    document.getElementById("popup").style.display =
    "flex";

    document.getElementById("p_wpm").innerText =
    document.getElementById("wpm").innerText;

    document.getElementById("p_acc").innerText =
    document.getElementById("acc").innerText;

    document.getElementById("p_score").innerText =
    document.getElementById("score").innerText;

}

/* HOME */
function goHome(){

    window.location.href = "../index.html";

}

</script>

</body>
</html>

</body>
</html>
